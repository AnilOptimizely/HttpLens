<!DOCTYPE html>
<html lang="en" data-httplens-base-path="/_httplens" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HttpLens</title>
    <base href="/_httplens/" />
    <link rel="stylesheet" href="css/httplens.css" />
</head>
<body>
  <header class="app-header">
    <h1>📡 HttpLens</h1>
    <span id="record-count" class="record-count">0 records</span>
    <div class="header-actions">
      <button id="btn-export-har">📦 HAR</button>
      <button id="btn-theme">🌙 Dark</button>
      <button id="btn-refresh">⟳ Refresh</button>
      <button id="btn-clear" class="danger">🗑 Clear</button>
    </div>
  </header>

  <div class="main-layout">
    <div class="table-pane">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Method</th>
            <th>URL</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Size</th>
          </tr>
        </thead>
        <tbody id="traffic-body"></tbody>
      </table>
    </div>

    <div id="detail-panel" class="detail-pane hidden">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="request">Request</button>
        <button class="tab-btn" data-tab="response">Response</button>
        <button class="tab-btn" data-tab="headers">Headers</button>
        <button class="tab-btn" data-tab="timing">Timing</button>
        <button class="tab-btn" data-tab="correlation">Correlation</button>
        <button class="tab-btn" data-tab="export">Export</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <script src="js/httplens.bundle.js"></script>
</body>
</html>
